name: Deploy AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
          AWS_DEPLOY_PATH: ${{ secrets.AWS_DEPLOY_PATH }}
          AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$AWS_DEPLOY_USER" || (echo "Missing secret AWS_DEPLOY_USER" && exit 1)
          test -n "$AWS_DEPLOY_PATH" || (echo "Missing secret AWS_DEPLOY_PATH" && exit 1)
          test -n "$AWS_DEPLOY_SSH_KEY" || (echo "Missing secret AWS_DEPLOY_SSH_KEY" && exit 1)

      - name: Build release archive
        run: |
          set -euo pipefail
          ARCHIVE_PATH="/tmp/telegram-whatsapp-bridge-release.tgz"
          rm -f "$ARCHIVE_PATH"

          tar \
            --exclude-vcs \
            --exclude='./node_modules' \
            --exclude='./.env' \
            --exclude='./data' \
            --exclude='./.wwebjs_auth' \
            --exclude='./.wwebjs_cache' \
            --exclude='./release.tgz' \
            -czf "$ARCHIVE_PATH" .

      - name: Configure SSH
        env:
          AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AWS_DEPLOY_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > /dev/null
          touch "$HOME/.ssh/known_hosts"
          ssh-keyscan -H -p 22 3.99.4.225 >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      - name: Test SSH TCP connectivity
        run: |
          set -euo pipefail
          echo "Testing TCP connection to 3.99.4.225:22"
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/3.99.4.225/22"
          echo "TCP connection OK"

      - name: Upload release archive
        env:
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 22 \
            /tmp/telegram-whatsapp-bridge-release.tgz \
            "$AWS_DEPLOY_USER@3.99.4.225:/tmp/telegram-whatsapp-bridge-release.tgz"

      - name: Run deploy script
        env:
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
          AWS_DEPLOY_PATH: ${{ secrets.AWS_DEPLOY_PATH }}
          AWS_DEPLOY_PM2_APP_NAME: ${{ secrets.AWS_DEPLOY_PM2_APP_NAME }}
          AWS_DEPLOY_PM2_FRONTEND_APP_NAME: ${{ secrets.AWS_DEPLOY_PM2_FRONTEND_APP_NAME }}
        run: |
          set -euo pipefail
          PM2_NAME="${AWS_DEPLOY_PM2_APP_NAME:-telegram-whatsapp-bridge}"
          PM2_FRONTEND_NAME="${AWS_DEPLOY_PM2_FRONTEND_APP_NAME:-portal-afiliado-web}"
          ssh \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 22 \
            "$AWS_DEPLOY_USER@3.99.4.225" \
            "APP_DIR='$AWS_DEPLOY_PATH' RELEASE_ARCHIVE='/tmp/telegram-whatsapp-bridge-release.tgz' PM2_APP_NAME='$PM2_NAME' PM2_FRONTEND_APP_NAME='$PM2_FRONTEND_NAME' bash -s" \
            < scripts/deploy-release.sh

      - name: Healthcheck
        env:
          AWS_DEPLOY_HEALTHCHECK_URL: ${{ secrets.AWS_DEPLOY_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_DEPLOY_HEALTHCHECK_URL:-}" ]; then
            echo "Healthcheck skipped: AWS_DEPLOY_HEALTHCHECK_URL not set"
            exit 0
          fi

          curl --fail --show-error --silent --retry 5 --retry-delay 5 "$AWS_DEPLOY_HEALTHCHECK_URL"
