name: Deploy AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Validate required secrets
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
          AWS_DEPLOY_PATH: ${{ secrets.AWS_DEPLOY_PATH }}
          AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$AWS_DEPLOY_HOST" || (echo "Missing secret AWS_DEPLOY_HOST" && exit 1)
          test -n "$AWS_DEPLOY_USER" || (echo "Missing secret AWS_DEPLOY_USER" && exit 1)
          test -n "$AWS_DEPLOY_PATH" || (echo "Missing secret AWS_DEPLOY_PATH" && exit 1)
          test -n "$AWS_DEPLOY_SSH_KEY" || (echo "Missing secret AWS_DEPLOY_SSH_KEY" && exit 1)

      - name: Build release archive
        run: |
          set -euo pipefail
          npm ci --omit=dev --no-audit --no-fund

          cd web
          npm ci --no-audit --no-fund
          CI=1 npm run build
          npm prune --omit=dev --no-audit --no-fund
          rm -rf .next/cache
          cd ..

          ARCHIVE_PATH="/tmp/telegram-whatsapp-bridge-release.tgz"
          rm -f "$ARCHIVE_PATH"

          tar \
            --exclude-vcs \
            --exclude='./.env' \
            --exclude='./data' \
            --exclude='./.wwebjs_auth' \
            --exclude='./.wwebjs_cache' \
            --exclude='./release.tgz' \
            -czf "$ARCHIVE_PATH" .

      - name: Configure SSH
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
          AWS_DEPLOY_SSH_KEY: ${{ secrets.AWS_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "$AWS_DEPLOY_SSH_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keygen -y -f "$HOME/.ssh/id_ed25519" > /dev/null
          touch "$HOME/.ssh/known_hosts"
          ssh-keyscan -H -p 22 "$AWS_DEPLOY_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

      - name: Test SSH TCP connectivity
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
        run: |
          set -euo pipefail
          echo "Testing TCP connection to $AWS_DEPLOY_HOST:22"
          timeout 15 bash -c "cat < /dev/null > /dev/tcp/$AWS_DEPLOY_HOST/22"
          echo "TCP connection OK"

      - name: Upload release archive
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          scp \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -P 22 \
            /tmp/telegram-whatsapp-bridge-release.tgz \
            "$AWS_DEPLOY_USER@$AWS_DEPLOY_HOST:/tmp/telegram-whatsapp-bridge-release.tgz"

      - name: Run deploy script
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
          AWS_DEPLOY_PATH: ${{ secrets.AWS_DEPLOY_PATH }}
          AWS_DEPLOY_PM2_APP_NAME: ${{ secrets.AWS_DEPLOY_PM2_APP_NAME }}
          AWS_DEPLOY_PM2_FRONTEND_APP_NAME: ${{ secrets.AWS_DEPLOY_PM2_FRONTEND_APP_NAME }}
        run: |
          set -euo pipefail
          PM2_NAME="${AWS_DEPLOY_PM2_APP_NAME:-telegram-whatsapp-bridge}"
          PM2_FRONTEND_NAME="${AWS_DEPLOY_PM2_FRONTEND_APP_NAME:-portal-afiliado-web}"
          ssh \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 22 \
            "$AWS_DEPLOY_USER@$AWS_DEPLOY_HOST" \
            "APP_DIR='$AWS_DEPLOY_PATH' RELEASE_ARCHIVE='/tmp/telegram-whatsapp-bridge-release.tgz' PM2_APP_NAME='$PM2_NAME' PM2_FRONTEND_APP_NAME='$PM2_FRONTEND_NAME' bash -s" \
            < scripts/deploy-release.sh

      - name: Healthcheck over SSH
        env:
          AWS_DEPLOY_HOST: ${{ secrets.AWS_DEPLOY_HOST }}
          AWS_DEPLOY_USER: ${{ secrets.AWS_DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=6 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p 22 \
            "$AWS_DEPLOY_USER@$AWS_DEPLOY_HOST" \
            "set -euo pipefail; \
            curl --fail --show-error --silent --retry 40 --retry-delay 3 --retry-connrefused http://127.0.0.1:3100/api/health; \
            curl --fail --show-error --silent --retry 40 --retry-delay 3 --retry-connrefused -I http://127.0.0.1:3000 > /dev/null"
